services:
  app:
    build: .
    ports:
      - 8000:8000
      
  db:
    image: mysql:latest
    container_name: db
    environment:
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'pass'
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: 'assettracker'
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: